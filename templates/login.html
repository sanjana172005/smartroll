<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
  <title>Login — smartroll</title>
  <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo"><span>CV</span></div>
    <h2>smartroll</h2>
    <p class="subtitle">Sign in to your admin account</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for msg in messages %}
        <div class="flash-error">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:8px">Sign in</button>
    </form>
    <p style="text-align:center;margin-top:18px;font-size:12px;color:var(--hint)">Admin access only — no registration</p>
  </div>
</div>
</body>
</html>
